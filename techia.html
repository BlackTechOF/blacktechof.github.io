<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechIA Chat</title>
  <link rel="stylesheet" href="techia.css">
  <!-- markdown + highlight.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <!-- ==================== LOGIN/CADASTRO ==================== -->
  <div id="auth-container" class="auth-box">
    <h2>Login / Cadastro</h2>
    <input type="text" id="username" placeholder="Usuário" />
    <input type="password" id="password" placeholder="Senha" />
    <div class="auth-buttons">
      <button onclick="register()">Cadastrar</button>
      <button onclick="login()">Entrar</button>
    </div>
  </div>

  <!-- ==================== CHAT ==================== -->
  <div id="chat-container" style="display:none">
    <div class="menu">
      <h2>
        <span class="icon">🤖</span> TechIA
      </h2>
      <!-- botão modo escuro -->
      <button id="darkModeToggle">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
            d="M12 3v1m0 16v1m8.485-8.485h1M3.515 12.515h1M16.95 7.05l.707.707M6.343 17.657l.707.707M16.95 16.95l.707-.707M6.343 6.343l.707-.707M12 5a7 7 0 000 14a7 7 0 000-14z"/>
        </svg>
      </button>
    </div>

    <main>
      <div class="chat-container">
        <div id="messages" class="messages"></div>
      </div>
    </main>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Digite sua mensagem..." />
      <button id="inputs">Enviar</button>
      <button id="interrupt-btn" style="display:none">Parar</button>
    </div>
  </div>

  <!-- script -->
  <script src="techia.js"></script>
  <script>
    // Dark mode toggle
    document.getElementById("darkModeToggle").addEventListener("click", () => {
      document.body.classList.toggle("dark");
    });
  </script>
</body>
</html>
