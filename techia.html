<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat IA</title>
  <link rel="stylesheet" href="techia.css" />
  <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/default.min.css" />
</head>
<body>
  <div class="chat-container">
    <div id="messages" class="messages"></div>
    
    <form id="chatForm" autocomplete="off" class="input-area">
      <input type="text" id="userInput" placeholder="Digite sua mensagem..." autocomplete="off" />
      <button id="enviar" type="submit">Enviar</button>
      <button id="interrupt-btn" type="button" style="display:none;">Parar</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script>hljs.highlightAll();</script>
  <script src="techia.js"></script>

  <script>
    // Previne o comportamento padrão do form (recarregar a página)
    document.getElementById("chatForm").addEventListener("submit", function(e) {
      e.preventDefault();
      sendMessage();
    });
  </script>
</body>
</html>
