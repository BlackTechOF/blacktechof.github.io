<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechIA Chat</title>
  <link rel="stylesheet" href="techia.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/default.min.css">
</head>
<body>
  <!-- ==================== LOGIN/CADASTRO ==================== -->
  <div id="auth-container" class="auth-box">
    <h2>Login / Cadastro</h2>
    <input type="text" id="username" placeholder="Usuário" />
    <input type="password" id="password" placeholder="Senha" />
    <div class="auth-buttons">
      <button onclick="register()">Cadastrar</button>
      <button onclick="login()">Entrar</button>
    </div>
  </div>

  <div class="sidebar">
        <button id="new-chat-btn">+ Novo Chat</button>
        <ul id="chat-list"></ul>
      </div>

  <!-- ==================== CHAT ==================== -->
  <div id="chat-container" style="display:none">
    <!-- MENU -->
    <div class="menu">
      <div class="menu-left">
        <h2><span class="icon">🤖</span> TechIA</h2>
      </div>
      <div class="menu-center">
        <button id="logoutBtn">Sair</button>
      </div>
      <div class="menu-right">
        <button id="darkModeToggle">🌙</button>
      </div>
    </div>

    <!-- LAYOUT PRINCIPAL -->
    <main>

      <!-- ÁREA DO CHAT -->
      <div class="chat-container">
        <div id="messages" class="messages"></div>

        <div class="input-area">
          <input type="text" id="userInput" placeholder="Digite sua mensagem..." />
          <button id="inputs">Enviar</button>
        </div>
      </div>
    </main>
  </div>

  <!-- ==================== SCRIPTS ==================== -->
  <script src="techia.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const darkToggle = document.getElementById("darkModeToggle");
      if (darkToggle) {
        darkToggle.addEventListener("click", () => {
          document.body.classList.toggle("dark");
        });
      }
    });
  </script>
</body>
</html>
